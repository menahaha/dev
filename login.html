<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskShield AI - Login</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(181, 53, 255, 0.15) 0%, var(--bg-main) 50%);
            position: relative;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem 2rem;
            position: relative;
            z-index: 10;
            border-top: 2px solid var(--neon-blue);
            border-bottom: 2px solid var(--neon-purple);
            animation: fadeIn 0.8s ease forwards, float 6s infinite ease-in-out;
        }
        .login-logo { text-align: center; margin-bottom: 2.5rem; }
        .login-logo i { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-logo h1 { font-size: 1.8rem; font-weight: 700; }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-gray); font-size: 0.85rem; }
        .form-group input {
            width: 100%; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 0.8rem 1rem 0.8rem 2.8rem; border-radius: var(--border-radius-sm);
            font-family: 'Inter', sans-serif; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); }
        .form-icon { position: absolute; left: 1rem; top: 2.3rem; color: var(--text-gray); }
        .login-bg-shapes .shape { position: absolute; filter: blur(80px); z-index: 1; border-radius: 50%; opacity: 0.4; }
        .shape-1 { width: 300px; height: 300px; background: var(--neon-blue); top: -100px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: var(--neon-purple); bottom: -150px; right: -150px; }
        .shape-3 { width: 200px; height: 200px; background: var(--neon-pink); top: 50%; left: 60%; }
    </style>
</head>
<body>
    
    <div class="login-wrapper">
        <div class="login-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>

        <div class="glass-card login-card">
            <div class="login-logo">
                <i class="fa-solid fa-shield-halved text-neon-blue drop-glow-blue"></i>
                <h1>RiskShield <span class="text-neon-purple drop-glow-purple">AI</span></h1>
                <p class="text-sm text-gray mt-1">Gig Worker Operations Hub</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Partner ID / Email</label>
                    <i class="fa-solid fa-user form-icon"></i>
                    <input type="text" placeholder="RS-10294" required>
                </div>
                <div class="form-group mb-3">
                    <label>Secure Passkey</label>
                    <i class="fa-solid fa-lock form-icon"></i>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="flex-between mb-3 text-sm">
                    <label class="flex-center gap-1 cursor-pointer text-gray">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="text-neon-blue hover-bg-blue" style="padding: 2px 4px; border-radius: 4px;">Forgot Passkey?</a>
                </div>

                <button type="submit" class="btn btn-primary bg-neon-blue text-dark glow-btn-blue full-width text-lg">
                    Authenticate Session <i class="fa-solid fa-arrow-right-to-bracket ml-1"></i>
                </button>
            </form>
            
            <div class="text-center mt-3 pt-2 border-t border-gray-dark text-sm text-gray">
                Biometric Login Available on Mobile App
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Communicate with top frame (index.html) to indicate login success
            if (window.parent) {
                window.parent.postMessage('login_success', '*');
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
